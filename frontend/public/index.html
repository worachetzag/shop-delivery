<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="ซำสูงพาณิชย์ — สั่งซื้อสินค้าออนไลน์ผ่าน LINE พร้อมจัดส่ง">
    <meta name="keywords" content="ซำสูงพาณิชย์, สั่งซื้อออนไลน์, LINE, LIFF, จัดส่ง">
    <title>ซำสูงพาณิชย์ — สั่งซื้อออนไลน์</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f8f9fa;
        }
        
        #root {
            min-height: 100vh;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 18px;
            color: #00B900;
        }
        
        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid #00B900;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <noscript>
        <div style="text-align: center; padding: 50px; font-size: 18px; color: #666;">
            คุณต้องเปิดใช้งาน JavaScript เพื่อใช้แอปพลิเคชันนี้
        </div>
    </noscript>
    <div id="root">
        <div class="loading">กำลังโหลด...</div>
    </div>
</body>
</html>
