# Render Blueprint — สร้าง Web Service จาก Dockerfile (แก้ env / เพิ่ม DATABASE_URL จาก Neon)
# ใช้งาน: Dashboard Render → Blueprints → New Blueprint Instance → เลือก repo นี้
#
# DATABASE_URL ไม่ได้สร้างให้อัตโนมัติ — ให้ไปที่ Neon แล้วใส่ใน Environment (Dashboard)

services:
  - type: web
    name: shop-delivery-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore
    # Django มีทั้ง /healthz และ /healthz/
    healthCheckPath: /healthz
    envVars:
      # อย่าเปิดบน production — flush DB + seed 67 สินค้าโหลดรูปทุกครั้งที่ container start = พอร์ตเปิดช้ามาก และข้อความ "No open ports"
      - key: RESET_DB_ON_START
        value: "0"
      - key: SEED_DEMO_ON_START
        value: "0"
      - key: SEED_IMAGES_ONLY_ON_START
        value: "0"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS_EXTRA
        sync: false
      - key: CSRF_TRUSTED_ORIGINS_EXTRA
        sync: false
      - key: NGROK_CROSS_SITE_COOKIES
        value: "True"
