<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ซำสูงพาณิชย์ — LIFF</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 24px;
            margin: 0;
            color: #fff;
        }
        .logo p {
            margin: 5px 0 0 0;
            opacity: 0.8;
            font-size: 14px;
        }
        .status {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .status h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }
        .status p {
            margin: 5px 0;
            font-size: 14px;
            opacity: 0.9;
        }
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #45a049;
        }
        .btn-secondary {
            background: #2196F3;
        }
        .btn-secondary:hover {
            background: #1976D2;
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.5);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        .loading {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>ซำสูงพาณิชย์</h1>
            <p>สั่งซื้อสินค้าออนไลน์</p>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>กำลังโหลด...</p>
        </div>

        <div id="content" style="display: none;">
            <div class="status">
                <h3>📱 สถานะ LIFF</h3>
                <p><strong>LIFF ID:</strong> {{ liff_id }}</p>
                <p><strong>หน้า:</strong> {{ page }}</p>
                <p><strong>สถานะ:</strong> <span id="liff-status">กำลังตรวจสอบ...</span></p>
            </div>

            <div id="user-info" style="display: none;">
                <div class="status">
                    <h3>👤 ข้อมูลผู้ใช้</h3>
                    <p><strong>ชื่อ:</strong> <span id="user-name">-</span></p>
                    <p><strong>ID:</strong> <span id="user-id">-</span></p>
                    <p><strong>รูป:</strong> <span id="user-picture">-</span></p>
                </div>
            </div>

            <button class="btn" onclick="initLiff()">🔄 เริ่มต้น LIFF</button>
            <button class="btn btn-secondary" onclick="getUserProfile()">👤 ดูข้อมูลผู้ใช้</button>
            <button class="btn btn-secondary" onclick="openExternal('https://61ecfa186a31.ngrok-free.app/api/products/')">🛍️ ดูสินค้า</button>
        </div>

        <div id="error" class="error" style="display: none;">
            <h3>❌ เกิดข้อผิดพลาด</h3>
            <p id="error-message"></p>
        </div>
    </div>

    <script>
        let liffInitialized = false;

        // เริ่มต้น LIFF
        function initLiff() {
            if (liffInitialized) {
                updateStatus('LIFF เริ่มต้นแล้ว');
                return;
            }

            updateStatus('กำลังเริ่มต้น LIFF...');
            
            liff.init({
                liffId: '{{ liff_id }}'
            }).then(() => {
                liffInitialized = true;
                updateStatus('✅ LIFF เริ่มต้นสำเร็จ');
                
                if (liff.isLoggedIn()) {
                    updateStatus('✅ เข้าสู่ระบบแล้ว');
                    getUserProfile();
                } else {
                    updateStatus('⚠️ ยังไม่ได้เข้าสู่ระบบ');
                }
            }).catch((err) => {
                showError('ไม่สามารถเริ่มต้น LIFF ได้: ' + err.message);
            });
        }

        // ดูข้อมูลผู้ใช้
        function getUserProfile() {
            if (!liffInitialized) {
                showError('กรุณาเริ่มต้น LIFF ก่อน');
                return;
            }

            if (!liff.isLoggedIn()) {
                showError('กรุณาเข้าสู่ระบบก่อน');
                return;
            }

            liff.getProfile().then(profile => {
                document.getElementById('user-name').textContent = profile.displayName;
                document.getElementById('user-id').textContent = profile.userId;
                document.getElementById('user-picture').textContent = profile.pictureUrl ? 'มี' : 'ไม่มี';
                document.getElementById('user-info').style.display = 'block';
                updateStatus('✅ โหลดข้อมูลผู้ใช้สำเร็จ');
            }).catch(err => {
                showError('ไม่สามารถโหลดข้อมูลผู้ใช้ได้: ' + err.message);
            });
        }

        // เปิดลิงก์ภายนอก
        function openExternal(url) {
            if (!liffInitialized) {
                showError('กรุณาเริ่มต้น LIFF ก่อน');
                return;
            }

            liff.openWindow({
                url: url,
                external: true
            });
        }

        // อัปเดตสถานะ
        function updateStatus(message) {
            document.getElementById('liff-status').textContent = message;
        }

        // แสดงข้อผิดพลาด
        function showError(message) {
            document.getElementById('error-message').textContent = message;
            document.getElementById('error').style.display = 'block';
        }

        // ซ่อนข้อผิดพลาด
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        // เริ่มต้นเมื่อโหลดหน้า
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                initLiff();
            }, 1000);
        };
    </script>
</body>
</html>
